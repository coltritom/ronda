name: Ronda Supabase Keep-Alive

on:
  schedule:
    # Se ejecuta cada 3 días a la medianoche (UTC)
    - cron: "0 0 */3 * *"
  workflow_dispatch: # Permite correrlo manualmente desde GitHub si querés

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Ronda API
        # IMPORTANTE: Cambiá la URL por el dominio real de tu app cuando la subas (ej. Vercel)
        run: |
          curl -X GET https://tu-dominio-en-vercel.com/api/keep-alive
